<!DOCTYPE html>
<html lang="vi">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- SEO TITLE -->
    <title>Sản phẩm {{brand}} Vietnam | LACO Industrial Marking</title>

    <!-- SEO META -->
    <meta name="description" content="{{description}}">
    <meta name="keywords" content="{{keywords}}">
    <meta name="author" content="Fast Group Engineering">
    <meta name="robots" content="index, follow">

    <!-- CANONICAL -->
    <link rel="canonical" href="{{url}}">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon-16x16.png">
    <link rel="manifest" href="../assets/images/site.webmanifest">

    <!-- OPEN GRAPH -->
    <meta property="og:title" content="{{brand}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:image" content="{{image}}">
    <meta property="og:url" content="{{url}}">
    <meta property="og:type" content="product">
    <meta property="og:locale" content="vi_VN">

    <!-- TWITTER -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{brand}}">
    <meta name="twitter:description" content="{{description}}">
    <meta name="twitter:image" content="https://markal.com.vn/assets/images/logo.png">

    <base href="/tempil-markal.com.vn/">
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="../assets/style.css">

    <!-- SCHEMA PRODUCT -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Product",
      "name": "{{brand}}",
      "image": ["https://markal.com.vn/assets/images/logo.png"],
      "description": "{{description}}",
      "sku": "{{brand}}",
      "brand": {
        "@type": "Brand",
        "name": "{{brand}}"
      },
        "manufacturer": {
        "@type": "Organization",
        "name": "LACO INDUSTRIES LLC",
        "address": {
            "@type": "PostalAddress",
            "addressCountry": "US"
        }
        },
        "offers": {
            "@type": "Offer",
            "priceCurrency": "VND",
            "availability": "https://schema.org/InStock",
            "url": "{{url}}",
            "price": "0",
            "priceValidUntil": "2026-12-31",
            "seller": {
                "@type": "Organization",
                "name": "Fast Group Engineering"
            }
        }, "review": [
        {
            "@type": "Review",
            "reviewRating": {
            "@type": "Rating",
            "ratingValue": "5"
            },
            "author": "Nguyen A"
        }
     ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "25"
        }
    }
    </script>

</head>

<body>
    <div class="app-container">
        <div class="app-wrapper">

            <!-- SIDEBAR -->
            <aside class="sidebar border-end" id="sidebar">
                <div class="sidebar-inner p-3 d-flex flex-column h-100">

                    <!-- MAIN MENU -->
                    <div class="menu-group">
                        <div class="menu-title">Menu</div>

                        <a href="/" class="brand-item d-flex align-items-center">
                            <i class="fa-solid fa-house me-2"></i>
                            Trang chủ
                        </a>

                        <a href="/contact.html" class="brand-item d-flex align-items-center">
                            <i class="fa-solid fa-envelope me-2"></i>
                            Liên hệ
                        </a>
                    </div>

                    <!-- BRANDS -->
                    <div class="menu-group mt-4">
                        <div class="menu-title">Brands</div>

                        <a href="/markal/" class="brand-item d-flex align-items-center">
                            <i class="fa-solid fa-pen me-2"></i>
                            Markal
                        </a>

                        <a href="/tempil/" class="brand-item d-flex align-items-center">
                            <i class="fa-solid fa-temperature-high me-2"></i>
                            Tempil
                        </a>

                        <a href="/laco/" class="brand-item d-flex align-items-center">
                            <i class="fa-solid fa-industry me-2"></i>
                            Laco
                        </a>
                    </div>

                    <!-- LANGUAGE -->
                    <div class="mt-auto pt-4">
                        <div class="menu-title">Language</div>

                        <div class="lang-switch">
                            <button class="active">🇻🇳 VI</button>
                            <button>🇬🇧 EN</button>
                        </div>
                    </div>

                </div>
            </aside>

            <!-- MAIN CONTENT -->
            <div class="main-area">

                <!-- HEADER -->
                <div class="header shadow-sm">
                    <div class="container-fluid d-flex align-items-center">

                        <!-- TOGGLE BUTTON -->
                        <button class="btn btn-outline-secondary me-3 d-lg-none" onclick="toggleSidebar()">
                            ☰
                        </button>

                        <a href="/" class="navbar-brand d-flex align-items-center">
                            <img src="/assets/images/logo.png" alt="Plastigauge Việt Nam Logo" class="img-fluid"
                                style="max-height: 40px; width: auto;">
                        </a>
                    </div>
                </div>

                <!-- CONTENT -->
                <main class="container-fluid py-4">

                    <!-- HOME -->
                    <section id="home">
                        <div class="text-center mb-5">
                            <h1 class="fw-bold">LACO Industrial Marking</h1>
                            <p class="text-muted">Giải pháp marking công nghiệp hàng đầu</p>
                        </div>
                    </section>

                    <!-- PRODUCT LIST -->
                    <section id="product-list" class="mt-5">

                        <div class="justify-content-between align-items-center mb-4">
                            {{title}}
                        </div>

                        <!-- GRID -->
                        <div class="row g-4" id="productGrid">

                            <!-- SAMPLE PRODUCT CARD (Python sẽ generate nhiều cái giống này) -->
                            {{content}}
                        </div>
                    </section>

                </main>

                <!-- FOOTER -->
                <footer class="footer bg-dark text-white text-center py-3">
                    Liên hệ để hổ trợ và báo giá nhanh chóng <i class="fa-solid fa-phone"></i> + (84) 938 888 958
                </footer>

            </div>
        </div>
    </div>

    <script src="../assets/js/app.js"></script>
    <div id="overlay" onclick="toggleSidebar()"></div>
</body>

</html>
